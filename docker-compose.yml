version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../devops/backend.Dockerfile
    container_name: enocomatik-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=${REDIS_URL}
      - AES_KEY=${AES_KEY}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
      - SEED_TECNICO_PASSWORD=${SEED_TECNICO_PASSWORD}
      - CATALOGO_ECONOMATO_PATH=/app/contexto/data/CATALOGO_ECONOMATO.xlsx
    volumes:
      - ./contexto/data:/app/contexto/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: ../devops/frontend.Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
    container_name: enocomatik-frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: always
