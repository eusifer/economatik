apiVersion: v1
kind: Namespace
metadata:
  name: enocomatik
---
# 1. Backend Service & Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enocomatik-backend
  namespace: enocomatik
  labels:
    app: enocomatik-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: enocomatik-backend
  template:
    metadata:
      labels:
        app: enocomatik-backend
    spec:
      containers:
      - name: backend
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/enocomatik-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4000
        envFrom:
        - secretRef:
            name: enocomatik-backend-secrets
        - configMapRef:
            name: enocomatik-backend-config
        resources:
          limits:
            cpu: "1000m"
            memory: "1024Mi"
          requests:
            cpu: "250m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: enocomatik-backend-service
  namespace: enocomatik
spec:
  ports:
  - port: 4000
    targetPort: 4000
    protocol: TCP
  selector:
    app: enocomatik-backend
  type: ClusterIP
---
# 2. Frontend Service & Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enocomatik-frontend
  namespace: enocomatik
  labels:
    app: enocomatik-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: enocomatik-frontend
  template:
    metadata:
      labels:
        app: enocomatik-frontend
    spec:
      containers:
      - name: frontend
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/enocomatik-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: enocomatik-frontend-service
  namespace: enocomatik
spec:
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    app: enocomatik-frontend
  type: ClusterIP
---
# 3. Ingress Route mapping
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: enocomatik-ingress
  namespace: enocomatik
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: enocomatik-backend-service
            port:
              number: 4000
      - path: /graphql
        pathType: Prefix
        backend:
          service:
            name: enocomatik-backend-service
            port:
              number: 4000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: enocomatik-frontend-service
            port:
              number: 3000
