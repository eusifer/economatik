name: ENOCOMATIK CI-CD Pipeline

# ──────────────────────────────────────────────────────────────────────────────
# PLATAFORMA DE DESPLIEGUE ACTIVA: Render (backend) + Vercel (frontend)
# ──────────────────────────────────────────────────────────────────────────────
# NOTA ARQUITECTURAL: La arquitectura objetivo de producción institucional es
# AWS EKS + ECR con orquestación Kubernetes (documentada en
# manual_operacion_despliegue_enocomatik.md, sección 3.3).
# Para la etapa académica/demo se utiliza Render + Vercel por ser gratuitos
# y no requerir tarjeta de crédito activa.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: Calidad — TypeScript Linting y Compilación (todo push/PR)
  # ════════════════════════════════════════════════════════════════════════════
  test-and-lint:
    name: "🔎 Calidad y Compilación"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json

    - name: Instalar Dependencias Backend
      run: cd backend && npm ci

    - name: Compilar TypeScript Backend (Linting implícito)
      env:
        # Variable mínima requerida para que crypto.ts no falle en fail-fast
        AES_KEY: ${{ secrets.AES_KEY }}
      run: cd backend && npm run build

    - name: Instalar Dependencias Frontend
      run: cd frontend && npm ci

    - name: Compilar Frontend Next.js
      run: cd frontend && npm run build

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: Validación Docker (build local sin push a ningún registry)
  #   — Solo verifica que los Dockerfiles compilan correctamente
  #   — No requiere cuenta AWS ni credenciales de cloud
  # ════════════════════════════════════════════════════════════════════════════
  docker-build-validate:
    name: "🐳 Validación Docker Build"
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Compilar imagen Backend (sin push)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: devops/backend.Dockerfile
        push: false
        tags: enocomatik-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Compilar imagen Frontend (sin push)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: devops/frontend.Dockerfile
        push: false
        tags: enocomatik-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3: Despliegue en Render (Backend — push a main)
  #   — Dispara el Deploy Hook de Render via HTTPS POST
  #   — No requiere CLI, Docker push, ni credenciales cloud
  # ════════════════════════════════════════════════════════════════════════════
  deploy-backend-render:
    name: "🚀 Deploy Backend → Render"
    needs: docker-build-validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Disparar Deploy Hook en Render
      run: |
        curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
          -H "Content-Type: application/json" \
          --max-time 30 \
          --retry 3 \
          --retry-delay 5
        echo "✅ Deploy hook enviado a Render. El despliegue se ejecutará en la plataforma."

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4: Despliegue en Vercel (Frontend — push a main)
  #   — Usa la CLI oficial de Vercel con token de autenticación
  # ════════════════════════════════════════════════════════════════════════════
  deploy-frontend-vercel:
    name: "🌐 Deploy Frontend → Vercel"
    needs: docker-build-validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar Vercel CLI
      run: npm install -g vercel

    - name: Desplegar en Vercel (Producción)
      run: |
        cd frontend
        vercel --prod --yes \
          --token=${{ secrets.VERCEL_TOKEN }} \
          --scope=${{ secrets.VERCEL_ORG_ID }}
      env:
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 5: Preview Frontend en Netlify para Pull Requests
  # ════════════════════════════════════════════════════════════════════════════
  netlify-preview:
    name: "👁️ Preview Frontend → Netlify"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar y Compilar Frontend
      run: |
        cd frontend
        npm ci
        npm run build

    - name: Desplegar Preview a Netlify
      uses: nwtgck/actions-netlify@v3.0
      with:
        publish-dir: './frontend/.next'
        production-deploy: false
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: "Deploy Preview PR #${{ github.event.number }}"
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
